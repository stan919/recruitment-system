<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户注册 — 职引未来 MERIDIAN CAREER</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/global.css">
<link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <!-- 背景 -->
    <div class="auth-bg"></div>
    <div class="auth-overlay"></div>

    <!-- 品牌标识 -->
    <a href="/" class="auth-brand">
        <div class="auth-brand-logo">M</div>
        <div class="auth-brand-text">
            <span>职引未来</span>
            <span class="auth-brand-en">MERIDIAN CAREER</span>
        </div>
    </a>

    <div class="auth-card" data-reveal>
        <div class="auth-card-header">
            <div class="auth-card-badge">JOIN US</div>
            <h1 class="auth-title">Find your dream job</h1>
            <p class="auth-subtitle">不海投，只匹配。创建账号，开启精准求职之旅。</p>
        </div>

        <div id="errorMessage" class="auth-error"></div>
        <div id="successMessage" class="auth-success"></div>

        <form id="registerForm">
            <div class="auth-field">
                <label class="auth-label"><i class="fas fa-user"></i> 用户名</label>
                <input type="text" id="username" class="auth-input" placeholder="3-20个字符" required minlength="3" maxlength="20">
            </div>

            <div class="auth-field">
                <label class="auth-label"><i class="fas fa-envelope"></i> 邮箱</label>
                <input type="email" id="email" class="auth-input" placeholder="请输入邮箱地址" required>
            </div>

            <div class="auth-field">
                <label class="auth-label"><i class="fas fa-lock"></i> 密码</label>
                <input type="password" id="password" class="auth-input" placeholder="至少 8 位密码" required minlength="8">
            </div>

            <div class="auth-field">
                <label class="auth-label"><i class="fas fa-check-circle"></i> 确认密码</label>
                <input type="password" id="confirmPassword" class="auth-input" placeholder="再次输入密码" required>
            </div>

            <button type="submit" class="auth-btn-primary" id="registerBtn">
                <span>Sign up</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="auth-footer">
            <span>已有账号？</span>
            <a href="{{ url_for('login') }}">去登录</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = '';
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('registerBtn');
            const err = document.getElementById('errorMessage');
            const suc = document.getElementById('successMessage');

            err.style.display = 'none';
            suc.style.display = 'none';

            if (password !== confirmPassword) {
                err.textContent = '两次输入的密码不一致';
                err.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';

            try {
                const resp = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, phone, password })
                });
                const data = await resp.json();
                if (resp.ok && data.success) {
                    window.location.href = '/login';
                } else {
                    err.textContent = data.message || '注册失败，请稍后重试';
                    err.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<span>Sign up</span> <i class="fas fa-arrow-right"></i>';
                }
            } catch (error) {
                err.textContent = '网络错误，请稍后重试';
                err.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<span>Sign up</span> <i class="fas fa-arrow-right"></i>';
            }
        });

        /* Scroll reveal */
        (function(){
            const els = document.querySelectorAll('[data-reveal]');
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => { if(entry.isIntersecting) { entry.target.classList.add('revealed'); obs.unobserve(entry.target); } });
            }, {threshold:0.1});
            els.forEach(el => obs.observe(el));
        })();
    </script>
</body>
</html>
