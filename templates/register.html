<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 职引未来</title>
    <style>
        /* Dribbble 极简风格 - 光影层次 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* 淡紫色装饰背景 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
        }

        .register-wrapper {
            width: 320px;
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        /* 毕业帽图标 - 光泽感 */
        .logo {
            width: 48px;
            height: 48px;
            margin-bottom: 24px;
            filter: drop-shadow(0 2px 8px rgba(201, 86, 247, 0.2));
        }

        .register-header {
            margin-bottom: 32px;
        }

        .register-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .register-subtitle {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            border-color: #c956f7;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #C956F7 0%, #A73BDE 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(201, 86, 247, 0.2);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(201, 86, 247, 0.35);
        }
        
        .register-footer {
            margin-top: 16px;
            font-size: 12px;
            color: #666;
        }

        .register-footer a {
            color: #1a1a1a;
            text-decoration: underline;
            font-weight: 600;
        }

        .error-message {
            color: #e53e3e;
            font-size: 13px;
            display: none;
            margin-bottom: 16px;
            font-weight: 500;
            letter-spacing: -0.01em;
            text-align: center;
        }

        .success-message {
            display: none;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .register-wrapper {
                width: 100%;
                max-width: 320px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration"></div>
    
    <div class="register-wrapper">
        <div class="register-header">
            <!-- 毕业帽 SVG 图标 -->
            <svg class="logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M24 4L4 14L24 24L44 14L24 4Z" fill="#C956F7" stroke="#C956F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M6 15V22C6 22 12 26 24 26C36 26 42 22 42 22V15" stroke="#C956F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M22 26V34" stroke="#C956F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 38H36" stroke="#C956F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1 class="register-title">Find your dream job</h1>
            <p class="register-subtitle">不海投，只匹配。</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <input type="text" id="username" class="form-control" placeholder="用户名" required minlength="3" maxlength="20">
            </div>
            
            <div class="form-group">
                <input type="email" id="email" class="form-control" placeholder="邮箱" required>
            </div>
            
            <div class="form-group">
                <input type="password" id="password" class="form-control" placeholder="密码（至少 8 位）" required minlength="8">
            </div>
            
            <div class="form-group">
                <input type="password" id="confirmPassword" class="form-control" placeholder="确认密码" required>
            </div>
            
            <button type="submit" class="btn-register" id="registerBtn">Sign up</button>
        </form>
        <div class="register-footer">
            已有账号？<a href="{{ url_for('login') }}">去登录</a>
        </div>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = '';
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const registerBtn = document.getElementById('registerBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // 重置错误信息
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // 验证密码
            if (password !== confirmPassword) {
                errorMessage.textContent = '两次输入的密码不一致';
                errorMessage.style.display = 'block';
                return;
            }
            
            // 禁用按钮
            registerBtn.disabled = true;
            registerBtn.textContent = 'Loading...';
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        phone: phone,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // 注册成功，直接跳转
                    window.location.href = '/login';
                } else {
                    // 注册失败
                    errorMessage.textContent = data.message || '注册失败，请稍后重试';
                    errorMessage.style.display = 'block';
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Continue';
                }
            } catch (error) {
                errorMessage.textContent = '网络错误，请稍后重试';
                errorMessage.style.display = 'block';
                registerBtn.disabled = false;
                registerBtn.textContent = 'Continue';
            }
        });
    </script>
</body>
</html>
