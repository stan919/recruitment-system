<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据洞察 - 职引未来</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
        }

        /* 导航栏 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 48px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #f0f0f0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: #8b5cf6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-size: 15px;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #8b5cf6;
        }

        /* 主内容区 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 24px 40px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .page-subtitle {
            font-size: 16px;
            color: #666;
        }

        /* 图表容器 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 32px;
            margin-bottom: 40px;
        }

        .chart-card {
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #f0f0f0;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: all 0.3s;
        }

        .chart-card:hover {
            transform: translateY(-4px);
            border-color: #e8e4ff;
            box-shadow: 0 12px 32px rgba(139, 92, 246, 0.1);
        }

        .chart-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a1a1a;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .chart-content {
            min-height: 500px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .navbar {
                padding: 16px 20px;
            }

            .nav-links {
                display: none;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">职</div>
            职引未来
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">首页</a>
            <a href="/jobs/search" class="nav-link">职位搜索</a>
            <a href="/insights" class="nav-link active">数据洞察</a>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">数据洞察</h1>
            <p class="page-subtitle">基于 500,000+ 条招聘数据的深度分析</p>
        </div>

        <!-- 图表展示区 -->
        <div class="charts-grid">
            <!-- 图表 1: 全国岗位分布地图 -->
            <div class="chart-card">
                <h3 class="chart-title"> 全国岗位分布</h3>
                <div class="chart-content" id="city-map"></div>
            </div>

            <!-- 图表 2: 薪资水平分析 -->
            <div class="chart-card">
                <h3 class="chart-title"> 各城市平均薪资对比</h3>
                <div class="chart-content" id="salary-bar"></div>
            </div>

            <!-- 图表 3: 学历要求分布 -->
            <div class="chart-card">
                <h3 class="chart-title"> 学历要求分布</h3>
                <div class="chart-content" id="education-pie"></div>
            </div>

            <!-- 图表 4: 经验要求分布 -->
            <div class="chart-card">
                <h3 class="chart-title"> 经验要求分布</h3>
                <div class="chart-content" id="experience-pie"></div>
            </div>

            <!-- 图表 5: 技能词云 -->
            <div class="chart-card" style="grid-column: 1 / -1;">
                <h3 class="chart-title"> 技能需求热词</h3>
                <div class="chart-content" id="skill-wordcloud"></div>
            </div>
        </div>
    </div>

    <!-- 加载图表 -->
    <script>
        // 使用 iframe 加载各个图表
        function loadChart(containerId, chartFile) {
            const iframe = document.createElement('iframe');
            iframe.src = chartFile;
            iframe.style.width = '100%';
            iframe.style.height = '500px';
            iframe.style.border = 'none';
            document.getElementById(containerId).appendChild(iframe);
        }

        // 页面加载完成后加载所有图表
        window.addEventListener('DOMContentLoaded', function() {
            loadChart('city-map', '/static/charts/city_map.html');
            loadChart('salary-bar', '/static/charts/salary_bar.html');
            loadChart('education-pie', '/static/charts/education_pie.html');
            loadChart('experience-pie', '/static/charts/experience_pie.html');
            loadChart('skill-wordcloud', '/static/charts/skill_wordcloud.html');
        });
    </script>
</body>
</html>
