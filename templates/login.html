<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 职引未来</title>
    <style>
        /* Dribbble 极简风格 - 光影层次 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* 淡紫色装饰背景 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
        }

        .login-wrapper {
            width: 320px;
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        /* 毕业帽图标 - 光泽感 */
        .logo {
            width: 48px;
            height: 48px;
            margin-bottom: 24px;
            filter: drop-shadow(0 2px 8px rgba(201, 86, 247, 0.2));
        }

        .login-header {
            margin-bottom: 32px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .login-subtitle {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(156, 39, 176, 0.1);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 1px 3px rgba(156, 39, 176, 0.05);
        }

        .form-control:focus {
            border-color: rgba(193, 86, 247, 0.4);
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(193, 86, 247, 0.12), inset 0 0 0 1px rgba(193, 86, 247, 0.05);
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, rgba(201, 86, 247, 0.95) 0%, rgba(167, 59, 222, 0.95) 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 8px;
            box-shadow: 
                0 4px 12px rgba(201, 86, 247, 0.25),
                0 1px 2px rgba(255, 255, 255, 0.8) inset;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.5s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 24px rgba(201, 86, 247, 0.4),
                0 1px 2px rgba(255, 255, 255, 0.9) inset;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .terms {
            font-size: 12px;
            color: #666;
            margin: 16px 0;
        }

        .terms a {
            color: #1a1a1a;
            text-decoration: underline;
        }

        .login-footer {
            margin-top: 16px;
            font-size: 12px;
            color: #666;
        }

        .login-footer a {
            color: #1a1a1a;
            text-decoration: underline;
            font-weight: 600;
        }

        .error-message {
            color: #e53e3e;
            font-size: 13px;
            display: none;
            margin-bottom: 16px;
            font-weight: 500;
            letter-spacing: -0.01em;
            text-align: center;
        }

        .success-message {
            display: none;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-wrapper {
                width: 100%;
                max-width: 320px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration"></div>
    
    <div class="login-wrapper">
        {% if already_logged_in %}
        <!-- 已登录状态 -->
        <div class="login-header">
            <!-- 毕业帽 SVG 图标 -->
            <svg class="logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M24 4L4 14L24 24L44 14L24 4Z" fill="#C956F7" stroke="#C956F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M6 15V22C6 22 12 26 24 26C36 26 42 22 42 22V15" stroke="#C956F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M22 26V34" stroke="#C956F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 38H36" stroke="#C956F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1 class="login-title">已登录</h1>
            <p class="login-subtitle">您已成功登录，当前用户：{{ session.get('username', '用户') }}</p>
        </div>
        <div class="success-message" style="display: block; background: linear-gradient(135deg, rgba(76, 175, 80, 0.05) 0%, rgba(76, 175, 80, 0.08) 100%); padding: 20px; border-radius: 12px; margin-bottom: 16px; border: 1px solid rgba(76, 175, 80, 0.2);">
            <svg style="width: 24px; height: 24px; display: block; margin: 0 auto 8px;" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 6L9 17L4 12" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p style="margin: 0; color: #2E7D32; font-weight: 600;">登录成功</p>
        </div>
        <button onclick="logout()" class="btn-login" style="background: linear-gradient(135deg, rgba(156, 39, 176, 0.8) 0%, rgba(123, 31, 162, 0.8) 100%);">退出登录</button>
        {% else %}
        <!-- 未登录状态 -->
        <div class="login-header">
            <!-- 毕业帽 SVG 图标 -->
            <svg class="logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M24 4L4 14L24 24L44 14L24 4Z" fill="#C956F7" stroke="#C956F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M6 15V22C6 22 12 26 24 26C36 26 42 22 42 22V15" stroke="#C956F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M22 26V34" stroke="#C956F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 38H36" stroke="#C956F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1 class="login-title">You Belong Here</h1>
            <p class="login-subtitle">别海投了，聊聊你真正想去的。</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" class="form-control" placeholder="手机号 / 邮箱 / 用户名" required>
            </div>
            
            <div class="form-group">
                <input type="password" id="password" class="form-control" placeholder="密码" required>
            </div>
            
            <div class="form-group" style="margin: 20px 0;">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: #666; cursor: pointer; margin-bottom: 8px;">
                    <input type="checkbox" id="companyLogin" style="width: auto; margin: 0;">
                    <span>企业登录</span>
                </label>
                <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: #666; cursor: pointer;">
                    <input type="checkbox" id="adminLogin" style="width: auto; margin: 0;">
                    <span>管理员登录</span>
                </label>
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">Continue</button>
        </form>
        
        <div class="login-footer">
            <a href="{{ url_for('register') }}" style="display: none;">免费注册</a>
            <button onclick="enterPlatform()" style="margin-left: 10px; padding: 10px 24px; border: 1px solid #1a1a1a; border-radius: 24px; background: white; color: #1a1a1a; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s;">进入平台</button>
        </div>
        {% endif %}
    </div>
    
    <script>
        // 进入平台
        function enterPlatform() {
            window.location.href = '/';
        }
        
        // 退出登录
        function logout() {
            fetch('/api/logout', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        localStorage.removeItem('user');
                        window.location.reload();
                    }
                });
        }
        
        // 复选框互斥逻辑
        document.addEventListener('DOMContentLoaded', function() {
            const companyLogin = document.getElementById('companyLogin');
            const adminLogin = document.getElementById('adminLogin');
            
            // 当勾选企业登录时，自动取消管理员登录
            companyLogin.addEventListener('change', function() {
                if (this.checked) {
                    adminLogin.checked = false;
                }
            });
            
            // 当勾选管理员登录时，自动取消企业登录
            adminLogin.addEventListener('change', function() {
                if (this.checked) {
                    companyLogin.checked = false;
                }
            });
        });
        
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const isCompany = document.getElementById('companyLogin').checked;
            const isAdmin = document.getElementById('adminLogin').checked;
            
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            
            // 重置错误信息
            errorMessage.style.display = 'none';
            
            // 禁用按钮
            loginBtn.disabled = true;
            loginBtn.textContent = 'Loading...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        is_company: isCompany,
                        is_admin: isAdmin
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // 登录成功，直接跳转
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                    }
                    
                    // 直接跳转，不显示提示
                    window.location.href = data.redirect || '/';
                } else {
                    // 登录失败
                    errorMessage.textContent = data.message || '账号或密码错误';
                    errorMessage.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Continue';
                }
            } catch (error) {
                errorMessage.textContent = '网络错误，请稍后重试';
                errorMessage.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Continue';
            }
        });
    </script>
</body>
</html>
