<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户登录 — 职引未来 MERIDIAN CAREER</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/global.css">
<link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <!-- 背景 -->
    <div class="auth-bg"></div>
    <div class="auth-overlay"></div>

    <!-- 品牌标识 -->
    <a href="/" class="auth-brand">
        <div class="auth-brand-logo">M</div>
        <div class="auth-brand-text">
            <span>职引未来</span>
            <span class="auth-brand-en">MERIDIAN CAREER</span>
        </div>
    </a>

    {% if already_logged_in %}
    <div class="auth-card" data-reveal>
        <div class="auth-card-icon"><i class="fas fa-check-circle"></i></div>
        <h1 class="auth-title">已登录</h1>
        <p class="auth-subtitle">您已成功登录，当前用户：{{ session.get('username', '用户') }}</p>
        <button onclick="logout()" class="auth-btn-primary">退出登录</button>
    </div>
    {% else %}
    <div class="auth-card" data-reveal>
        <div class="auth-card-header">
            <div class="auth-card-badge">WELCOME</div>
            <h1 class="auth-title">You Belong Here</h1>
            <p class="auth-subtitle">登录到职引未来，开启你的职业旅程</p>
        </div>

        <div id="errorMessage" class="auth-error"></div>

        <form id="loginForm">
            <div class="auth-field">
                <label class="auth-label"><i class="fas fa-user"></i> 账号</label>
                <input type="text" id="username" class="auth-input" placeholder="手机号 / 邮箱 / 用户名" required>
            </div>

            <div class="auth-field">
                <label class="auth-label"><i class="fas fa-lock"></i> 密码</label>
                <input type="password" id="password" class="auth-input" placeholder="输入密码" required>
            </div>

            <div class="auth-mode-row">
                <label class="auth-check">
                    <input type="checkbox" id="companyLogin">
                    <span class="auth-check-mark"></span>
                    <span>企业登录</span>
                </label>
                <label class="auth-check">
                    <input type="checkbox" id="adminLogin">
                    <span class="auth-check-mark"></span>
                    <span>管理员登录</span>
                </label>
            </div>

            <button type="submit" class="auth-btn-primary" id="loginBtn">
                <span>Continue</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="auth-footer">
            <span>还没有账号？</span>
            <a href="{{ url_for('register') }}">免费注册</a>
            <span class="auth-footer-divider">|</span>
            <button onclick="enterPlatform()" class="auth-link-btn">进入平台</button>
        </div>
    </div>
    {% endif %}

    <script>
        function enterPlatform() { window.location.href = '/'; }

        function logout() {
            fetch('/api/logout', { method: 'POST' })
                .then(r => r.json())
                .then(data => { if (data.success) { localStorage.removeItem('user'); window.location.reload(); } });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const companyLogin = document.getElementById('companyLogin');
            const adminLogin = document.getElementById('adminLogin');
            if (companyLogin && adminLogin) {
                companyLogin.addEventListener('change', function() { if (this.checked) adminLogin.checked = false; });
                adminLogin.addEventListener('change', function() { if (this.checked) companyLogin.checked = false; });
            }

            const form = document.getElementById('loginForm');
            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const username = document.getElementById('username').value.trim();
                    const password = document.getElementById('password').value;
                    const isCompany = document.getElementById('companyLogin').checked;
                    const isAdmin = document.getElementById('adminLogin').checked;
                    const btn = document.getElementById('loginBtn');
                    const err = document.getElementById('errorMessage');
                    err.style.display = 'none';
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
                    try {
                        const resp = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password, is_company: isCompany, is_admin: isAdmin })
                        });
                        const data = await resp.json();
                        if (resp.ok && data.success) {
                            if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
                            window.location.href = data.redirect || '/';
                        } else {
                            err.textContent = data.message || '账号或密码错误';
                            err.style.display = 'block';
                            btn.disabled = false;
                            btn.innerHTML = '<span>Continue</span> <i class="fas fa-arrow-right"></i>';
                        }
                    } catch (error) {
                        err.textContent = '网络错误，请稍后重试';
                        err.style.display = 'block';
                        btn.disabled = false;
                        btn.innerHTML = '<span>Continue</span> <i class="fas fa-arrow-right"></i>';
                    }
                });
            }
        });

        /* Scroll reveal */
        (function(){
            const els = document.querySelectorAll('[data-reveal]');
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => { if(entry.isIntersecting) { entry.target.classList.add('revealed'); obs.unobserve(entry.target); } });
            }, {threshold:0.1});
            els.forEach(el => obs.observe(el));
        })();
    </script>
</body>
</html>
