<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职位详情 - 职引未来</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 48px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #f0f0f0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-size: 15px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #8b5cf6;
        }

        .back-btn {
            padding: 10px 24px;
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 100px auto 60px;
            padding: 0 24px;
        }

        .job-detail-card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            margin-bottom: 32px;
        }

        .job-header {
            margin-bottom: 32px;
            padding-bottom: 32px;
            border-bottom: 2px solid #f0f0f0;
        }

        .job-title {
            font-size: 36px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .job-company {
            font-size: 20px;
            color: #6b7280;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .company-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .job-meta {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 24px;
        }

        .meta-item {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f2ff 100%);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .meta-label {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .meta-value {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .salary-highlight {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .job-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .job-description {
            font-size: 16px;
            line-height: 1.8;
            color: #4b5563;
            padding: 24px;
            background: #f9fafb;
            border-radius: 16px;
            border-left: 4px solid #667eea;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .skill-tag {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            color: #4b5563;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            cursor: default;
        }

        .skill-tag:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.3);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .info-item {
            padding: 20px;
            background: #f9fafb;
            border-radius: 12px;
        }

        .info-label {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 16px;
            color: #1a1a1a;
            font-weight: 600;
        }

        .apply-btn {
            width: 100%;
            padding: 18px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .apply-btn:hover {
            background: #333;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #999;
            font-size: 18px;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            border-bottom: 1px solid #f0f0f0;
        }

        .modal-header h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .close {
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close:hover {
            color: #1a1a1a;
        }

        .modal-body {
            padding: 32px;
        }

        .step {
            margin-bottom: 32px;
        }

        .step-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .step-number {
            width: 24px;
            height: 24px;
            background: #666;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #1a1a1a;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .upload-area {
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #1a1a1a;
            background: #f5f5f5;
        }

        .upload-area.has-file {
            border-color: #1a1a1a;
            background: #f5f5f5;
        }

        .upload-icon {
            font-size: 32px;
            color: #666;
            margin-bottom: 12px;
        }

        .upload-text {
            color: #666;
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 13px;
            color: #999;
        }

        .file-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: #f8f7ff;
            border-radius: 10px;
            margin-top: 16px;
        }

        .file-name {
            color: #1a1a1a;
            font-weight: 600;
        }

        .remove-file {
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #f0f0f0;
        }

        .btn-cancel,
        .btn-submit {
            padding: 12px 32px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-cancel {
            background: #f5f5f5;
            color: #666;
        }

        .btn-cancel:hover {
            background: #e5e5e5;
        }

        .btn-submit {
            background: #1a1a1a;
            color: white;
        }

        .btn-submit:hover {
            background: #333;
        }

        /* 预览弹窗样式 */
        .preview-modal {
            display: flex;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
        }

        .preview-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            height: 90%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .preview-header h3 {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        .close-btn {
            background: transparent;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #333;
            padding: 0;
            display: inline;
            font-weight: normal;
        }

        .close-btn:hover {
            color: #000;
        }

        .preview-body {
            flex: 1;
            overflow: hidden;
            height: calc(100% - 50px);
        }

        .preview-body iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">职</div>
            职引未来
        </div>
        <div class="nav-links">
            <a href="/">首页</a>
            <a href="/jobs/search">职位搜索</a>
            <a href="/insights">数据洞察</a>
        </div>
        <button class="back-btn" onclick="goBack()">← 返回</button>
    </nav>

    <!-- 主内容区 -->
    <div class="container">
        <div id="jobDetail">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <!-- 申请弹窗 -->
    <div id="applicationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>申请职位</h2>
                <span class="close" onclick="closeApplicationModal()">&times;</span>
            </div>
            <div class="modal-body">
                <!-- 步骤 1：基本信息 -->
                <div class="step">
                    <h3 class="step-title">
                        <span class="step-number">1</span>
                        基本信息
                    </h3>
                    <div class="form-group">
                        <label>姓名 *</label>
                        <input type="text" id="name" placeholder="请输入姓名" required>
                    </div>
                    <div class="form-group">
                        <label>手机号 *</label>
                        <input type="tel" id="phone" placeholder="请输入手机号" required>
                    </div>
                    <div class="form-group">
                        <label>邮箱 *</label>
                        <input type="email" id="email" placeholder="请输入邮箱" required>
                    </div>
                    <div class="form-group">
                        <label>学历</label>
                        <select id="education" style="width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px;">
                            <option value="">请选择</option>
                            <option value="高中">高中</option>
                            <option value="大专">大专</option>
                            <option value="本科">本科</option>
                            <option value="硕士">硕士</option>
                            <option value="博士">博士</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>毕业年份</label>
                        <input type="number" id="graduation_year" placeholder="如：2024" min="2000" max="2030">
                    </div>
                    <div class="form-group">
                        <label>学校</label>
                        <input type="text" id="school" placeholder="请输入学校名称">
                    </div>
                    <div class="form-group">
                        <label>专业</label>
                        <input type="text" id="major" placeholder="请输入专业名称">
                    </div>
                </div>

                <!-- 步骤 2：工作和技能 -->
                <div class="step">
                    <h3 class="step-title">
                        <span class="step-number">2</span>
                        工作经历和技能
                    </h3>
                    <div class="form-group">
                        <label>工作经历</label>
                        <textarea id="work_experience" placeholder="请描述您的工作经历" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label>技能特长</label>
                        <textarea id="skills" placeholder="请描述您的技能特长" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>自我介绍</label>
                        <textarea id="self_introduction" placeholder="请做简单的自我介绍" rows="4"></textarea>
                    </div>
                </div>

                <!-- 步骤 3：上传简历 -->
                <div class="step">
                    <h3 class="step-title">
                        <span class="step-number">3</span>
                        上传简历附件
                    </h3>
                    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()"
                         ondrop="handleDrop(event)" ondragover="handleDragOver(event)">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">点击或拖拽上传简历</div>
                        <div class="upload-hint">支持 PDF、Word 格式，最大 10MB</div>
                    </div>
                    <input type="file" id="fileInput" accept=".pdf,.doc,.docx" style="display: none;" onchange="handleFileSelect(event)">
                    <div id="fileInfo" class="file-info" style="display: none;">
                        <span class="file-name" id="fileName"></span>
                        <div style="display: flex; gap: 8px;">
                            <span class="remove-file" onclick="removeResume()">✕ 删除</span>
                            <span class="remove-file" onclick="previewResume()" style="color: #8b5cf6;">👁 预览</span>
                        </div>
                    </div>
                </div>

                <!-- 步骤 4：申请信息 -->
                <div class="step">
                    <h3 class="step-title">
                        <span class="step-number">4</span>
                        申请信息
                    </h3>
                    <div class="form-group">
                        <label>期望薪资</label>
                        <input type="text" id="expected_salary" placeholder="如：8000-10000 或 面议">
                    </div>
                    <div class="form-group">
                        <label>申请理由</label>
                        <textarea id="reason" placeholder="为什么想加入我们？" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label>其他信息</label>
                        <textarea id="other_info" placeholder="其他需要说明的信息（选填）" rows="3"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeApplicationModal()">取消</button>
                    <button type="button" class="btn-submit" onclick="submitApplication()">提交申请</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 获取 URL 中的职位 ID（从路径参数）
        const pathParts = window.location.pathname.split('/');
        const jobId = pathParts[pathParts.length - 1];

        // 返回上一页
        function goBack() {
            window.location.href = '/jobs/search#top';
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function safeText(value, fallback = '-') {
            if (value === null || value === undefined || value === '') {
                return fallback;
            }
            return escapeHtml(String(value));
        }

        function formatSalaryRange(minSalary, maxSalary) {
            const minNum = Number(minSalary);
            const maxNum = Number(maxSalary);
            if (!Number.isFinite(minNum) || !Number.isFinite(maxNum) || minNum <= 0 || maxNum <= 0) {
                return '薪资面议';
            }
            return `¥${(minNum / 1000).toFixed(0)}k-¥${(maxNum / 1000).toFixed(0)}k`;
        }

        // 加载职位详情
        function loadJobDetail() {
            if (!jobId) {
                document.getElementById('jobDetail').innerHTML = `
                    <div class="loading">
                        <h2>职位 ID 缺失</h2>
                        <p>请从搜索结果页面进入</p>
                    </div>
                `;
                return;
            }

            fetch(`/api/jobs/${jobId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        renderJobDetail(data.job);
                    } else {
                        document.getElementById('jobDetail').innerHTML = `
                            <div class="loading">
                                <h2>职位不存在</h2>
                                <p>该职位可能已被删除或下架</p>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    console.error('加载失败:', error);
                    document.getElementById('jobDetail').innerHTML = `
                        <div class="loading">
                            <h2>加载失败</h2>
                            <p>请稍后重试</p>
                        </div>
                    `;
                });
        }

        // 渲染职位详情
        function renderJobDetail(job) {
            const skills = job.skill_tags
                ? String(job.skill_tags).split(',').map(s => s.trim()).filter(Boolean)
                : [];

            const safeJobName = safeText(job.job_name, '未知职位');
            const safeCompanyName = safeText(job.company_name, '未知公司');
            const safeIndustry = safeText(job.industry, '');
            const safeCity = safeText(job.city, '未知城市');
            const safeDistrict = job.district ? `·${safeText(job.district, '')}` : '';
            const safeEducation = safeText(job.education, '不限');
            const safeExperience = safeText(job.experience, '不限');
            const safeDescription = job.description
                ? escapeHtml(String(job.description)).replace(/\n/g, '<br>')
                : '暂无详细描述';
            const safeCompanySize = safeText(job.company_size, '');
            const safePublishDate = safeText(job.publish_date, '');
            
            document.getElementById('jobDetail').innerHTML = `
                <div class="job-detail-card">
                    <div class="job-header">
                        <h1 class="job-title">${safeJobName}</h1>
                        <div class="job-company">
                            ${safeCompanyName}
                            ${job.industry ? `<span class="company-tag">${safeIndustry}</span>` : ''}
                        </div>
                        
                        <div class="job-meta">
                            <div class="meta-item">
                                <div class="meta-label">薪资</div>
                                <div class="meta-value salary-highlight">${formatSalaryRange(job.min_salary, job.max_salary)}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">城市</div>
                                <div class="meta-value">${safeCity}${safeDistrict}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">学历</div>
                                <div class="meta-value">${safeEducation}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">经验</div>
                                <div class="meta-value">${safeExperience}</div>
                            </div>
                        </div>
                    </div>

                    <div class="job-section">
                        <h2 class="section-title">职位描述</h2>
                        <div class="job-description">
                            ${safeDescription}
                        </div>
                    </div>

                    ${skills.length > 0 ? `
                    <div class="job-section">
                        <h2 class="section-title">技能要求</h2>
                        <div class="skill-tags">
                            ${skills.map(skill => `<span class="skill-tag">${safeText(skill, '')}</span>`).join('')}
                        </div>
                    </div>
                    ` : ''}

                    <div class="job-section">
                        <h2 class="section-title">公司信息</h2>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">公司名称</div>
                                <div class="info-value">${safeCompanyName}</div>
                            </div>
                            ${job.company_size ? `
                            <div class="info-item">
                                <div class="info-label">公司规模</div>
                                <div class="info-value">${safeCompanySize}</div>
                            </div>
                            ` : ''}
                            ${job.is_campus ? `
                            <div class="info-item">
                                <div class="info-label">职位类型</div>
                                <div class="info-value">校招岗位</div>
                            </div>
                            ` : ''}
                            ${job.publish_date ? `
                            <div class="info-item">
                                <div class="info-label">发布日期</div>
                                <div class="info-value">${safePublishDate}</div>
                            </div>
                            ` : ''}
                        </div>
                    </div>

                    <button class="apply-btn" onclick="applyJob()">立即申请</button>
                </div>
            `;
        }

        // 申请职位
        function applyJob() {
            // 检查是否登录
            fetch('/api/user')
                .then(response => response.json())
                .then(data => {
                    if (data.logged_in) {
                        openApplicationModal();
                    } else {
                        if (confirm('请先登录后再申请职位')) {
                            window.location.href = '/login';
                        }
                    }
                })
                .catch(() => {
                    window.location.href = '/login';
                });
        }
        
        // 检查是否是编辑模式
        const urlParams = new URLSearchParams(window.location.search);
        const editAppId = urlParams.get('edit');
        if (editAppId) {
            // 编辑模式，加载申请详情
            loadApplicationForEdit(editAppId);
        } else {
            // 不是编辑模式，清空标志
            window.editingApplicationId = null;
        }
        
        // 加载申请用于编辑
        function loadApplicationForEdit(appId) {
            // 设置编辑模式标志
            window.editingApplicationId = appId;
            
            fetch(`/api/application/${appId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const app = data.application;
                        // 打开弹窗并填充数据
                        openApplicationModal();
                        // 填充申请信息（基本信息从简历加载，申请信息从申请加载）
                        setTimeout(() => {
                            document.getElementById('expected_salary').value = app.expected_salary || '';
                            document.getElementById('reason').value = app.reason || '';
                            document.getElementById('other_info').value = app.other_info || '';
                        }, 300);
                    }
                })
                .catch(error => {
                    console.error('加载申请失败:', error);
                });
        }

        // 打开申请弹窗
        function openApplicationModal() {
            document.getElementById('applicationModal').style.display = 'flex';
            // 检查是否是编辑模式
            if (window.editingApplicationId) {
                // 编辑已有申请，加载用户简历数据
                loadUserResume();
            } else {
                // 新申请，清空表单
                clearApplicationForm();
            }
        }

        // 关闭申请弹窗
        function closeApplicationModal() {
            document.getElementById('applicationModal').style.display = 'none';
        }

        // 加载用户简历
        function loadUserResume() {
            fetch('/api/resume')
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.resume) {
                        // 填充简历信息
                        document.getElementById('name').value = data.resume.name || '';
                        document.getElementById('phone').value = data.resume.phone || '';
                        document.getElementById('email').value = data.resume.email || '';
                        document.getElementById('education').value = data.resume.education || '';
                        document.getElementById('graduation_year').value = data.resume.graduation_year || '';
                        document.getElementById('school').value = data.resume.school || '';
                        document.getElementById('major').value = data.resume.major || '';
                        document.getElementById('work_experience').value = data.resume.work_experience || '';
                        document.getElementById('skills').value = data.resume.skills || '';
                        document.getElementById('self_introduction').value = data.resume.self_introduction || '';
                        
                        if (data.resume.has_attachment) {
                            document.getElementById('fileInfo').style.display = 'flex';
                            document.getElementById('fileName').textContent = data.resume.attachment_name;
                        }
                    }
                })
                .catch(error => {
                    console.error('加载简历失败:', error);
                });
        }

        // 保存简历
        function saveResume() {
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                education: document.getElementById('education').value,
                graduation_year: document.getElementById('graduation_year').value,
                school: document.getElementById('school').value,
                major: document.getElementById('major').value,
                work_experience: document.getElementById('work_experience').value,
                skills: document.getElementById('skills').value,
                self_introduction: document.getElementById('self_introduction').value
            };
            
            return fetch('/api/resume', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    return result;
                } else {
                    throw new Error(result.message);
                }
            });
        }

        // 上传简历附件
        function uploadResume(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            return fetch('/api/resume/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    document.getElementById('fileInfo').style.display = 'flex';
                    document.getElementById('fileName').textContent = result.filename;
                } else {
                    alert(result.message);
                }
            })
            .catch(error => {
                console.error('上传失败:', error);
                alert('上传失败，请重试');
            });
        }

        // 提交申请
        function submitApplication() {
            // 验证必填项
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            
            if (!name || !phone || !email) {
                alert('请填写基本信息');
                return;
            }
            
            // 保存简历
            saveResume()
                .then(() => {
                    const expectedSalary = document.getElementById('expected_salary').value;
                    const reason = document.getElementById('reason').value;
                    const otherInfo = document.getElementById('other_info').value;
                    
                    // 检查是编辑还是新申请
                    if (window.editingApplicationId) {
                        // 更新申请
                        return fetch(`/api/application/${window.editingApplicationId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                expected_salary: expectedSalary,
                                reason: reason,
                                other_info: otherInfo
                            })
                        })
                        .then(response => response.json())
                        .then(result => {
                            if (result.success) {
                                alert('修改成功！');
                                closeApplicationModal();
                                clearApplicationForm();
                                window.editingApplicationId = null;
                                // 跳转到投递记录页面
                                window.location.href = '/applications';
                            } else {
                                alert(result.message || '修改失败，请重试');
                            }
                        });
                    } else {
                        // 新申请
                        return fetch('/api/application/submit', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                job_id: jobId,
                                job_name: currentJob ? currentJob.job_name : '',
                                company_name: currentJob ? currentJob.company_name : '',
                                expected_salary: expectedSalary,
                                reason: reason,
                                other_info: otherInfo
                            })
                        })
                        .then(response => response.json())
                        .then(result => {
                            if (result.success) {
                                alert('申请成功！\n\n您的简历已提交给企业。');
                                closeApplicationModal();
                                // 清空表单数据
                                clearApplicationForm();
                                // 重新加载职位详情（刷新页面）
                                loadJobDetail();
                            } else {
                                alert(result.message || '申请失败，请重试');
                            }
                        });
                    }
                })
                .catch(error => {
                    console.error('提交失败:', error);
                    alert('申请失败，请重试');
                });
        }

        // 文件上传处理
        let currentJob = null;
        
        // 删除简历
        function removeResume() {
            fetch('/api/resume/attachment', {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    document.getElementById('fileInfo').style.display = 'none';
                    document.getElementById('fileName').textContent = '';
                    document.getElementById('fileInput').value = '';
                } else {
                    alert(result.message || '删除失败');
                }
            })
            .catch(error => {
                console.error('删除失败:', error);
                alert('删除失败，请重试');
            });
        }
        
        // 预览简历
        function previewResume() {
            const fileName = document.getElementById('fileName').textContent;
            if (!fileName) {
                alert('没有可预览的简历');
                return;
            }
            
            // 根据文件类型决定预览还是下载
            const ext = fileName.split('.').pop().toLowerCase();
            if (ext === 'pdf') {
                // PDF 文件：打开预览弹窗
                fetch('/api/resume/attachment/preview')
                    .then(response => {
                        if (response.ok) {
                            return response.blob();
                        }
                        throw new Error('预览失败');
                    })
                    .then(blob => {
                        const url = URL.createObjectURL(blob);
                        showPreviewModal(url);
                    })
                    .catch(error => {
                        console.error('预览失败:', error);
                        alert('预览失败，请重试');
                    });
            } else {
                // Word 文件：直接下载
                window.location.href = '/api/resume/attachment/download';
            }
        }
        
        // 显示预览弹窗
        function showPreviewModal(url) {
            // 创建预览弹窗 HTML
            const previewHTML = `
                <div id="previewModal" class="preview-modal" onclick="closePreviewModal()">
                    <div class="preview-content" onclick="event.stopPropagation()">
                        <div class="preview-header">
                            <h3>简历预览</h3>
                            <button class="close-btn" onclick="closePreviewModal()">✕ 关闭</button>
                        </div>
                        <div class="preview-body">
                            <iframe src="${url}" width="100%" height="100%" frameborder="0"></iframe>
                        </div>
                    </div>
                </div>
            `;
            
            // 添加到页面
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = previewHTML;
            document.body.appendChild(tempDiv);
        }
        
        // 关闭预览弹窗
        function closePreviewModal() {
            const modal = document.getElementById('previewModal');
            if (modal) {
                modal.remove();
            }
        }
        
        // 清空申请表单
        function clearApplicationForm() {
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('email').value = '';
            document.getElementById('education').value = '';
            document.getElementById('graduation_year').value = '';
            document.getElementById('school').value = '';
            document.getElementById('major').value = '';
            document.getElementById('work_experience').value = '';
            document.getElementById('skills').value = '';
            document.getElementById('self_introduction').value = '';
            document.getElementById('expected_salary').value = '';
            document.getElementById('reason').value = '';
            document.getElementById('other_info').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('fileInput').value = '';
            // 清空简历数据，下次打开时不加载
            window.savedResumeData = null;
        }
        
        // 渲染职位详情时保存当前职位信息
        const originalRenderJobDetail = renderJobDetail;
        renderJobDetail = function(job) {
            currentJob = job;
            originalRenderJobDetail(job);
        };

        // 文件选择处理
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const ext = file.name.split('.').pop().toLowerCase();
                if (!['pdf', 'doc', 'docx'].includes(ext)) {
                    alert('仅支持 PDF 和 Word 格式');
                    return;
                }
                uploadResume(file);
            }
        }

        // 拖拽上传处理
        function handleDrop(event) {
            event.preventDefault();
            const file = event.dataTransfer.files[0];
            if (file) {
                handleFileSelect({ target: { files: [file] } });
            }
        }

        function handleDragOver(event) {
            event.preventDefault();
        }

        // 页面加载时获取职位详情
        loadJobDetail();
    </script>
</body>
</html>
